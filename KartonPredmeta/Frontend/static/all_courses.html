<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>All Courses</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
<div class="page-shell">
    <h1>All Courses</h1>
    <div class="page-subtitle">Open a course row to view full details.</div>

    <div class="button-container">
        <button class="btn-slim btn-outline" onclick="location.href='index.html'">Back</button>
    </div>

    <table id="courses-table" class="add-course-table table-like-add">
        <thead>
        <tr>
            <th>ID</th>
            <th>Course Name</th>
            <th>ECTS</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    async function loadCourses() {
        const res = await fetch("/api/courses");
        const data = await res.json();

        const tbody = document.querySelector("#courses-table tbody");
        tbody.innerHTML = "";

        data.forEach(c => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.ects ?? "-"}</td>
            `;
            tr.onclick = () => {
                window.location.href = "course_detail.html?id=" + c.id;
            };
            tbody.appendChild(tr);
        });
    }

    loadCourses();
</script>

</body>
</html>
